model_name: Qwen/Qwen2.5-1.5B-Instruct
train_path: data/processed/sft_easy1000_unsolvable100.jsonl
output_dir: outputs/sft-qwen25-15b-easy1000-unsolvable100-lora
prompt_template: |
  You are solving an arithmetic puzzle.
  Use the numbers {numbers} exactly once each.
  Your goal is to make {target}.
  You may only use +, -, *, /, and parentheses.
  First reason in <think></think>, then provide the final answer in <answer></answer>.
  Keep the <think> section brief.
  If a valid expression exists, put exactly one expression in <answer> and nothing else.
  If no valid expression exists, put exactly NO_SOLUTION in <answer>.
  Do not include words, explanations, or an equals sign in <answer>.
torch_dtype: float32
max_steps: 1500
learning_rate: 1.0e-4
weight_decay: 0.0
warmup_ratio: 0.03
lr_scheduler_type: cosine
logging_steps: 25
save_steps: 1500
num_train_epochs: 4
per_device_train_batch_size: 2
gradient_accumulation_steps: 1
max_length: 384
bf16: false
fp16: false
gradient_checkpointing: false
optim: adamw_torch
report_to:
  - none
lora:
  enabled: true
  r: 32
  alpha: 64
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
