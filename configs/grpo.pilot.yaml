model_name: Qwen/Qwen2.5-1.5B-Instruct
output_dir: outputs/grpo-qwen25-15b-pilot
bf16: false
fp16: true
gradient_checkpointing: true
torch_dtype: float16
max_steps: 20
train_limit: 160
learning_rate: 5.0e-5
weight_decay: 0.0
warmup_ratio: 0.03
lr_scheduler_type: cosine
logging_steps: 1
save_steps: 20
eval_steps: 20
num_train_epochs: 1
per_device_train_batch_size: 2
gradient_accumulation_steps: 1
num_generations: 2
max_prompt_length: 256
max_completion_length: 96
beta: 0.04
temperature: 0.8
top_p: 0.95
optim: adamw_torch
report_to:
  - none
reward_weights:
  format: 0.05
  valid_expression: 0.15
  proximity: 0.15
  correct: 2.0
  number_mismatch_penalty: -1.0
lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
