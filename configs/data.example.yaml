train_path: data/processed/train.jsonl
eval_path: data/processed/eval.jsonl
unsolvable_eval_path: data/processed/unsolvable_eval.jsonl
tot_nonoverlap_path: data/processed/tot_nonoverlap.jsonl
tot_easy100_path: data/processed/tot_easy100.jsonl
id_train_path: data/processed/id_train.jsonl
id_test_path: data/processed/id_test.jsonl
tot_non_easy_path: data/processed/tot_non_easy.jsonl
tot_hard_path: data/processed/tot_hard.jsonl

prompt_template: |
  You are solving an arithmetic puzzle.
  Use the numbers {numbers} exactly once each.
  Your goal is to make {target}.
  You may only use +, -, *, /, and parentheses.
  First reason in <think></think>, then provide the final answer in <answer></answer>.
  Keep the <think> section brief.
  If a valid expression exists, put exactly one expression in <answer> and nothing else.
  If no valid expression exists, put exactly NO_SOLUTION in <answer>.
  Do not include words, explanations, or an equals sign in <answer>.

max_prompt_length: 256
max_completion_length: 192
